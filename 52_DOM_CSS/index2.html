<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .font{
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        .redText{
            color: red;
        }
        .blueText{
            color: blue;
        }
        .greenText{
            color: green;
        }
        .background{
            background-color: aqua;
        }
        .darkMode{
            background-color: black;
            padding: 1.5rem;
        }
        .lightMode{
            background-color: grey;
            padding: 1.5rem;
        }
        .underline{
            text-decoration: underline;
            
        }
        .filter{
            filter: drop-shadow(5px 5px 10px rgba(12, 140, 160, 0.8));
        }
    </style>
</head>
<body>
    <h1>Learn Dynamic CSS</h1>
    <h2>DOM : CSS manipulation using ClassName and ClassList</h2>
    <br>
    <p id="p1">para 1</p>
    <p id="p2">para 2</p>
    <p id="p3">para 3</p>

    <div id="dabba" class="darkMode greenText">Hello Developpers !!</div>

    <script src="script2.js"></script>
</body>
</html>
